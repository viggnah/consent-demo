[oauth]
authorize_all_scopes = true
allowed_scopes = ["consent.*"]

[[resource.access_control]]
context="(.*)/scim2/Me"
secure=true
http_method="GET"
cross_tenant=true
permissions=[]
scopes=[]

[[resource.access_control]]
context="(.*)/oauth2/ciba(.*)"
secure="false"
http_method="all"

[[event_listener]]
id = "token_revocation"
type = "org.wso2.carbon.identity.core.handler.AbstractIdentityHandler"
name = "org.wso2.is.notification.ApimOauthEventInterceptor"
order = 1
[event_listener.properties]
notification_endpoint = "https://localhost:9443/internal/data/v1/notify"
username = "${admin.username}"
password = "${admin.password}"
'header.X-WSO2-KEY-MANAGER' = "WSO2-IS"

[[resource.access_control]]
context = "(.*)/fs/authenticationendpoint/(.*)"
http_method = "all"
secure = "false"

[oauth.endpoints.v2]
oauth2_consent_page = "${carbon.protocol}://consent.gov:${carbon.management.port}/fs/authenticationendpoint/oauth2_authz.do"
oidc_consent_page = "${carbon.protocol}://consent.gov:${carbon.management.port}/fs/authenticationendpoint/oauth2_consent.do"


[[oauth.custom_response_type]]
class = "com.wso2.consent.accelerator.response.handler.ConsentHybridResponseTypeHandler"
name = "code id_token"

[[oauth.custom_response_type]]
name = "cibaAuthCode"
class = "com.wso2.consent.accelerator.response.handler.OBCibaResponseTypeHandler"
validator = "com.wso2.consent.accelerator.response.validator.OBCibaResponseTypeValidator"

[oauth.grant_type.refresh_token]
enable = true
grant_handler = "com.wso2.consent.accelerator.grant.handler.FSRefreshGrantHandler"

[oauth.grant_type.authorization_code]
enable = true
grant_handler = "com.wso2.consent.accelerator.grant.handler.FSAuthorizationCodeGrantHandler"

[[oauth.custom_grant_type]]
name="urn:openid:params:grant-type:ciba"
grant_handler="com.wso2.consent.accelerator.grant.handler.OBCibaGrantHandler"
grant_validator="org.wso2.carbon.identity.oauth.ciba.grant.CibaGrantValidator"

[oauth.custom_grant_type.properties]
IdTokenAllowed=true

[oauth.oidc]
enable_claims_separation_for_access_tokens = false
enable_hybrid_flow_app_level_validation = false

[oauth.oidc.extensions]
claim_callback_handler = "com.wso2.consent.accelerator.claims.FSDefaultOIDCClaimsCallbackHandler"
ciba_request_object_validator="com.wso2.consent.accelerator.request.OBCIBARequestObjectValidationExtension"


[authentication.authenticator.sample_authenticator]
name = "SampleLocalAuthenticator"
enable = true