# This workflow builds the consent server and creates a GitHub release on demand.

name: 🚀 Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0). Leave empty to use version.txt'
        required: false
        type: string
      prerelease:
        description: 'Set as a pre-release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  GOFLAGS: "-mod=readonly"

jobs:
  # ============================================================================
  # Job: Prepare - Determine and validate release version
  # ============================================================================
  prepare:
    name: 📋 Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      prerelease: ${{ steps.get_version.outputs.prerelease }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: 📝 Determine Release Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            if [ ! -f version.txt ] || [ -z "$(cat version.txt | tr -d '[:space:]')" ]; then
              echo "❌ Error: version.txt not found or empty"
              exit 1
            fi
            VERSION=$(tr -d '[:space:]' < version.txt)
            PRERELEASE="true"
          fi

          # Ensure version has 'v' prefix
          if [[ ! $VERSION == v* ]]; then
            VERSION="v${VERSION}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "✅ Using version: $VERSION"

      - name: ✅ Validate Release Version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Validate semver format (vX.Y[.Z][-prerelease][+build])
          if ! [[ $VERSION =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9a-zA-Z.-]+)?(\+[0-9a-zA-Z.-]+)?$ ]]; then
            echo "❌ Error: Version '$VERSION' does not follow format vX.Y[.Z][-PRERELEASE][+BUILD]"
            echo "❌ Version must start with 'v'"
            exit 1
          fi
          echo "✅ Version '$VERSION' format is valid"

          # Ensure tag does not already exist
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Error: Tag '$VERSION' already exists"
            echo "❌ Please update version.txt with a new version before running the release"
            exit 1
          fi
          echo "✅ Tag '$VERSION' does not exist yet - proceeding with release"

  # ============================================================================
  # Job: Test - Run unit tests
  # ============================================================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: ⚙️ Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: consent-server/go.mod
          cache: false

      - name: 🗄️ Cache Go Modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 📦 Install Dependencies
        run: |
          cd consent-server
          go mod download

      - name: 🧪 Run Unit Tests
        run: ./build.sh test_unit

  # ============================================================================
  # Job: Test Integration - Run integration tests against MySQL
  # ============================================================================
  test-integration:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    needs: [prepare, test]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: consent_mgt_integration_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: ⚙️ Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: consent-server/go.mod
          cache: false

      - name: 🗄️ Cache Go Modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 📦 Install Dependencies
        run: |
          cd consent-server && go mod download
          cd ../tests/integration && go mod download

      - name: ⏳ Wait for MySQL to be Ready
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -ppassword --silent 2>/dev/null; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Attempt $i/30 - MySQL not ready yet, waiting..."
            sleep 2
          done

      - name: 🔨 Build Server Binary for Integration Tests
        run: ./build.sh build linux amd64

      - name: 🧪 Run Integration Tests
        run: ./build.sh test_integration

  # ============================================================================
  # Job: Build - Cross-compile and package for all platforms
  # ============================================================================
  build:
    name: 🔨 Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [prepare, test, test-integration]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: 🏷️ Set Release Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "$VERSION" > version.txt
          echo "✅ Set version.txt to $VERSION"

      - name: ⚙️ Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: consent-server/go.mod
          cache: false

      - name: 🗄️ Cache Go Modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 📦 Install Dependencies
        run: |
          cd consent-server
          go mod download

      - name: 🔨 Build and Package
        run: ./build.sh package ${{ matrix.goos }} ${{ matrix.goarch }}

      - name: 📤 Upload Distribution Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: consent-server-dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: target/dist/*.zip
          if-no-files-found: error

  # ============================================================================
  # Job: Release - Create GitHub release with all platform artifacts
  # ============================================================================
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, test, test-integration, build]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: 📥 Download All Distribution Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: consent-server-dist-*
          path: ./dist-artifacts
          merge-multiple: true

      - name: 📋 List Release Artifacts
        run: |
          echo "📦 Release artifacts:"
          ls -lah ./dist-artifacts/

      - name: 🏷️ Create Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          git tag -a "$TAG_VERSION" -m "Release $TAG_VERSION"
          echo "✅ Created local tag $TAG_VERSION (will be pushed after all steps succeed)"

      - name: � Generate Detailed Release Notes
        id: release_notes
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const currentTag = '${{ needs.prepare.outputs.version }}';
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            // ── Determine previous tag ──────────────────────────────────────
            let previousTag = null;
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: repoOwner, repo: repoName, per_page: 2
              });
              if (releases.length > 0) {
                const latest = releases[0];
                previousTag = (latest.tag_name === currentTag && releases[1])
                  ? releases[1].tag_name
                  : latest.tag_name !== currentTag ? latest.tag_name : null;
              }
            } catch (e) {
              console.log('Could not fetch previous releases:', e.message);
            }

            // ── Generate changelog via GitHub API ───────────────────────────
            let changelog = '';
            try {
              const params = { owner: repoOwner, repo: repoName, tag_name: currentTag };
              if (previousTag) params.previous_tag_name = previousTag;
              const { data } = await github.rest.repos.generateReleaseNotes(params);
              changelog = data.body || '';
            } catch (e) {
              console.log('Could not generate release notes:', e.message);
            }

            // ── Build download table ────────────────────────────────────────
            // build.sh strips the 'v' prefix for zip naming: v0.5.0 -> consent-server-0.5.0-<os>-<arch>.zip
            const ver = currentTag.startsWith('v') ? currentTag.slice(1) : currentTag;
            const baseUrl = `https://github.com/${repoOwner}/${repoName}/releases/download/${currentTag}`;

            const table = [
              '| OS | Architecture | Download |',
              '|-------|-------------|---------|',
              `| 🍎 macOS | ARM64 (Apple Silicon) | [consent-server-${ver}-macos-arm64.zip](${baseUrl}/consent-server-${ver}-macos-arm64.zip) |`,
              `| 🍎 macOS | x64 (Intel)           | [consent-server-${ver}-macos-x64.zip](${baseUrl}/consent-server-${ver}-macos-x64.zip) |`,
              `| 🐧 Linux | x64                   | [consent-server-${ver}-linux-x64.zip](${baseUrl}/consent-server-${ver}-linux-x64.zip) |`,
              `| 🐧 Linux | ARM64                 | [consent-server-${ver}-linux-arm64.zip](${baseUrl}/consent-server-${ver}-linux-arm64.zip) |`,
              `| 🪟 Windows | x64                 | [consent-server-${ver}-win-x64.zip](${baseUrl}/consent-server-${ver}-win-x64.zip) |`,
            ].join('\n');

            // ── Build quickstart section ────────────────────────────────────
            const quickstart = `
            ## ⚡ Quickstart

            ### Download and Run

            1. Download the distribution for your platform:

            ${table}

            2. Unzip and navigate into the directory:
            \`\`\`bash
            unzip consent-server-${ver}-<os>-<arch>.zip
            cd consent-server-${ver}-<os>-<arch>/
            \`\`\`

            3. Start the server:
            \`\`\`bash
            ./start.sh
            \`\`\`

            > On Windows use \`start.sh\` via Git Bash or WSL.

            ### Configuration

            The server configuration is located at \`repository/conf/deployment.yaml\`.
            Update the database connection settings before starting the server.

            ### Database

            SQL scripts to initialize the database schema are in the \`dbscripts/\` directory.

            ---

            📖 Refer to the [README](https://github.com/${repoOwner}/${repoName}#readme) for full configuration and API documentation.
            `.replace(/^            /gm, '');

            // ── Combine body ────────────────────────────────────────────────
            const body = [changelog, quickstart].filter(Boolean).join('\n\n---\n\n');

            const fs = require('fs');
            fs.writeFileSync('release-body.md', body);
            console.log(`✅ Release notes generated (${body.length} chars)`);

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Consent Server ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: ./dist-artifacts/*.zip
          body_path: release-body.md

      - name: 📝 Calculate Next Development Version
        id: next_version
        run: |
          RELEASE_VERSION="${{ needs.prepare.outputs.version }}"
          # Strip 'v' prefix for arithmetic
          if [[ $RELEASE_VERSION == v* ]]; then
            RELEASE_VERSION="${RELEASE_VERSION#v}"
          fi

          # Parse version components
          if [[ $RELEASE_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          elif [[ $RELEASE_VERSION =~ ^([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="0"
          else
            echo "❌ Error: Unable to parse version: $RELEASE_VERSION"
            exit 1
          fi

          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Next development version: $NEXT_VERSION"

      - name: 🏷️ Bump version.txt for Next Development Cycle
        run: |
          NEXT_VERSION="v${{ steps.next_version.outputs.next_version }}"
          echo "$NEXT_VERSION" > version.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.txt
          git commit -m "[Release] Bump version to ${NEXT_VERSION} for next development iteration"
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ Updated version.txt to $NEXT_VERSION"

      - name: 📤 Push Git Tag
        run: |
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          git push origin "$TAG_VERSION"
          echo "✅ Pushed tag $TAG_VERSION"
