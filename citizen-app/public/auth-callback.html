<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Consent Response</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .icon-approve { background: #e8f5e9; color: #2e7d32; }
  .icon-deny { background: #fbe9e7; color: #c62828; }
  h2 { font-size: 20px; margin-bottom: 8px; color: #212121; }
  p { font-size: 14px; color: #616161; line-height: 1.5; margin-bottom: 16px; }
  .hint { font-size: 12px; color: #9e9e9e; margin-top: 8px; }
  .close-btn {
    display: inline-block; margin-top: 16px;
    padding: 10px 28px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    color: #fff; background: #1565c0;
    transition: background .2s;
  }
  .close-btn:hover { background: #0d47a1; }
</style>
</head>
<body>
<div class="card" id="resultCard">
  <div class="icon" id="icon"></div>
  <h2 id="title"></h2>
  <p id="message"></p>
  <button class="close-btn" onclick="window.close()">Close this window</button>
  <div class="hint">You can safely close this tab and return to the Citizen App.</div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var icon = document.getElementById('icon');
  var title = document.getElementById('title');
  var message = document.getElementById('message');

  if (params.get('error')) {
    icon.className = 'icon icon-deny';
    icon.textContent = '✕';
    title.textContent = 'Consent Denied';
    message.textContent = 'You have denied the data sharing request. No personal data will be shared with the requesting party.';
  } else {
    icon.className = 'icon icon-approve';
    icon.textContent = '✓';
    title.textContent = 'Consent Approved';
    message.textContent = 'Your consent has been recorded. The requested data will be shared with the bank.';
  }
})();
</script>
</body>
</html>
