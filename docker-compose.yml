version: '3.8'

services:
  # MySQL database for OpenFGC
  mysql:
    image: mysql:8.0
    container_name: consent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: consent_mgt
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./openfgc/consent-server/dbscripts/db_schema_mysql.sql:/docker-entrypoint-initdb.d/db_schema_mysql.sql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - consent-network

  # OpenFGC Consent Management Server
  openfgc:
    build:
      context: ./openfgc
      dockerfile: Dockerfile
    container_name: consent-openfgc
    ports:
      - "3000:3000"
    volumes:
      - ./docker/openfgc/conf/deployment.yaml:/app/repository/conf/deployment.yaml
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - consent-network

  # Mock KYC Backend API
  mock-backend:
    build:
      context: ./mock-backend
      dockerfile: Dockerfile
    container_name: consent-mock-backend
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consent-network

  # WSO2 Identity Server 7.1.0
  identity-server:
    build:
      context: ./docker/is
      dockerfile: Dockerfile
    container_name: consent-is
    ports:
      - "9446:9446"
    environment:
      OPENFGC_BASE_URL: "http://openfgc:3000"
      CONSENT_ORG_ID: "DEMO-ORG-001"
      CONSENT_CLIENT_ID: "YSZ6l_tcxc7wTtuGzaEyopAZ_SIa"
      IS_BASE_URL: "https://localhost:9446"
      IS_ADMIN_AUTH: "Basic YWRtaW46YWRtaW4="
    depends_on:
      openfgc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9446/carbon/admin/login.jsp"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      consent-network:
        aliases:
          - consent.gov

  # WSO2 API Manager 4.5.0
  api-manager:
    build:
      context: ./docker/apim
      dockerfile: Dockerfile
    container_name: consent-apim
    ports:
      - "9443:9443"
      - "8243:8243"
      - "8280:8280"
    depends_on:
      identity-server:
        condition: service_healthy
      openfgc:
        condition: service_healthy
      mock-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9443/carbon/admin/login.jsp"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - consent-network

volumes:
  mysql-data:

networks:
  consent-network:
    driver: bridge
